finance:
  min_hourly_income: 600
  currency: "RUB"

car:
  car_cost_per_km: 17.05
  amortization_factor: 0.8
  fuel_price_per_liter: 70
  fuel_consumption_l_per_100km: 10

defaults:
  avg_speed_kmh: 30
  service_minutes: 20
  telemed_minutes: 3
  route_time_factor: 1.0

route:
  always_return_to_finish: true
  optimize_after_each_accept: true

geo:
  default_city: "Санкт-Петербург"
  default_region: "Ленинградская область"
  nominatim_url: "https://nominatim.openstreetmap.org"
  user_agent: "home-visit-profit-bot/1.0"
  # Ни районы, ни компании не задаются заранее: приложение массовое, и у каждого
  # пользователя они свои. Зоны обслуживания (область → город → районы) и список
  # компаний пользователь заводит сам в настройках.
  base_districts: []
  clinics: []
  telemed_clinics: []

routing:
  # Свой OSRM на сервере 2 (5 федеральных округов, профиль car). Публичный
  # router.project-osrm.org — демо-сервис: он лимитирует запросы и не даёт гарантий,
  # а у нас на нём висит вердикт по каждому заказу.
  osrm_url: "http://194.87.93.174:5000"
  request_timeout_seconds: 10
  fallback_to_estimate: true
  straight_line_factor: 1.35

location_api:
  enabled: true
  host: "0.0.0.0"
  port: 8088
  geofence_radius_m: 120
  dwell_minutes: 12
  notification_cooldown_minutes: 60
