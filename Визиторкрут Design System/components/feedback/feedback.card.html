<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; }
  .demo { display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .lbl { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
         color: var(--text-tertiary); width: 100%; margin-bottom: -6px; }
  .toasts { display: flex; gap: 12px; flex-wrap: wrap; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" data-presets="react">
    const { Badge, Tag, Toast, Tooltip, IconButton, Button, Icon } = window.DesignSystem_ee81bc;
    function Demo() {
      const [f, setF] = React.useState('taxi');
      return (
        <div className="demo">
          <div className="row">
            <span className="lbl">Badge</span>
            <Badge variant="success" dot>Онлайн</Badge>
            <Badge variant="info" appearance="solid">Новый</Badge>
            <Badge variant="warning">Ждёт оплаты</Badge>
            <Badge variant="neutral" appearance="outline" size="sm">×3 в очереди</Badge>
          </div>
          <div className="row">
            <span className="lbl">Tag · фильтры</span>
            <Tag icon={<Icon name="car-front" size={14} />} selected={f==='taxi'} onClick={()=>setF('taxi')}>Такси</Tag>
            <Tag icon={<Icon name="package" size={14} />} selected={f==='courier'} onClick={()=>setF('courier')}>Курьер</Tag>
            <Tag icon={<Icon name="stethoscope" size={14} />} selected={f==='doc'} onClick={()=>setF('doc')}>Врач</Tag>
            <Tag onRemove={()=>{}}>8–15 км</Tag>
          </div>
          <div className="row">
            <span className="lbl">Toast · Tooltip</span>
            <div className="toasts">
              <Toast variant="success" title="Заказ взят. Погнали!" onClose={()=>{}} />
              <Toast variant="warning" title="Пробка на маршруте">+12 минут — но всё ещё стоит ехать.</Toast>
            </div>
            <Tooltip content="Расчёт: оплата − бензин − износ − время" placement="top">
              <IconButton aria-label="Как считаем" variant="outline"><Icon name="help-circle" /></IconButton>
            </Tooltip>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
