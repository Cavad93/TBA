<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 20px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" data-presets="react">
    const { Input, Textarea, Select, Icon } = window.DesignSystem_ee81bc;
    function Demo() {
      const [t, setT] = React.useState('');
      return (
        <div className="grid">
          <Input label="Телефон" iconLeft={<Icon name="phone" size={16} />} placeholder="+7 900 000-00-00" />
          <Input label="Цена бензина" suffix="₽/л" defaultValue="58" />
          <Input label="E-mail" defaultValue="ivan@" error="Проверь адрес — не хватает домена" />
          <Select label="Транспорт" placeholder="Выбери" value={t} onChange={(e)=>setT(e.target.value)}
            options={[{value:'car',label:'Авто'},{value:'bike',label:'Велосипед'},{value:'foot',label:'Пешком'}]} />
          <div style={{ gridColumn: '1 / -1' }}>
            <Textarea label="Комментарий клиенту" rows={2} placeholder="Например: перезвоните за 10 минут до приезда" />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
