<!-- @dsCard group="Components" viewport="700x250" name="Кнопки" subtitle="Button + IconButton — варианты, размеры, состояния" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; }
  .demo { display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .lbl { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
         color: var(--text-tertiary); width: 100%; margin-bottom: -6px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" data-presets="react">
    const { Button, IconButton, Icon } = window.DesignSystem_ee81bc;
    function Demo() {
      return (
        <div className="demo">
          <div className="row">
            <span className="lbl">Варианты</span>
            <Button variant="primary" iconLeft={<Icon name="circle-check" size={18} />}>Взять заказ</Button>
            <Button variant="secondary">Пропустить</Button>
            <Button variant="ghost">Показать расчёт</Button>
            <Button variant="danger" iconLeft={<Icon name="x" size={18} />}>Отменить</Button>
          </div>
          <div className="row">
            <span className="lbl">Размеры</span>
            <Button size="sm">sm</Button>
            <Button size="md">md</Button>
            <Button size="lg">lg</Button>
            <Button size="xl" iconRight={<Icon name="arrow-right" size={20} />}>xl — главное действие</Button>
          </div>
          <div className="row">
            <span className="lbl">Состояния · IconButton</span>
            <Button loading>Загрузка</Button>
            <Button disabled>Недоступно</Button>
            <IconButton aria-label="Назад" variant="outline"><Icon name="arrow-left" /></IconButton>
            <IconButton aria-label="Меню" variant="ghost"><Icon name="menu" /></IconButton>
            <IconButton aria-label="Курс" variant="solid" round><Icon name="navigation" /></IconButton>
            <IconButton aria-label="Избранное" variant="soft"><Icon name="star" /></IconButton>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
