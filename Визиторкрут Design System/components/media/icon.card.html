<!-- @dsCard group="Components" viewport="700x180" name="Иконки (компонент)" subtitle="Icon — обёртка над Lucide: size · strokeWidth · color" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; }
  .demo { display: flex; flex-direction: column; gap: 20px; }
  .row { display: flex; align-items: center; gap: 22px; flex-wrap: wrap; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .lbl { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
         color: var(--text-tertiary); width: 130px; }
  .cap { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" data-presets="react">
    const { Icon } = window.DesignSystem_ee81bc;
    function Demo() {
      const glyphs = ['navigation','route','map-pin','car-front','bike','package','stethoscope','wrench','wallet','fuel','clock','gauge'];
      return (
        <div className="demo">
          <div className="row">
            <span className="lbl">Размеры и цвет</span>
            <div className="cell"><Icon name="navigation" size={18} /><span className="cap">18</span></div>
            <div className="cell"><Icon name="navigation" size={24} /><span className="cap">24</span></div>
            <div className="cell"><Icon name="navigation" size={32} color="var(--brand)" /><span className="cap">32 · brand</span></div>
            <div className="cell"><Icon name="navigation" size={32} strokeWidth={2.5} color="var(--danger)" /><span className="cap">stroke 2.5</span></div>
          </div>
          <div className="row">
            <span className="lbl">Набор продукта</span>
            {glyphs.map(g => <Icon key={g} name={g} size={24} />)}
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
