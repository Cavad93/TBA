<!-- @dsCard group="Components" viewport="700x200" name="Навигация" subtitle="Tabs — line + segmented" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; }
  .demo { display: flex; flex-direction: column; gap: 22px; }
  .lbl { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 8px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" data-presets="react">
    const { Tabs } = window.DesignSystem_ee81bc;
    function Demo() {
      const [a, setA] = React.useState('feed');
      const [b, setB] = React.useState('week');
      return (
        <div className="demo">
          <div>
            <div className="lbl">line</div>
            <Tabs value={a} onChange={setA} items={[
              {value:'feed',label:'Лента',count:12},
              {value:'active',label:'Активные'},
              {value:'history',label:'История'},
            ]} />
          </div>
          <div>
            <div className="lbl">segmented · fullWidth</div>
            <Tabs variant="segmented" fullWidth value={b} onChange={setB} items={[
              {value:'day',label:'День'},
              {value:'week',label:'Неделя'},
              {value:'month',label:'Месяц'},
            ]} />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
