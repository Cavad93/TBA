<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Визиторкрут — стоит ли ехать</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--paper); }
  .w-container { max-width: 1160px; margin: 0 auto; padding: 0 24px; }
  .w-wordmark { font-family: var(--font-display); font-weight: 800; font-size: 22px; letter-spacing: -0.02em; color: var(--ink); }
  .w-wordmark-inv { color: #fff; }
  .w-eyebrow { display: inline-block; font-size: 12px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; color: var(--brand); }
  .w-center { display: block; text-align: center; margin-left: auto; margin-right: auto; }
  .w-accent { color: var(--brand); }

  /* nav */
  .w-nav { border-bottom: 1px solid var(--border-subtle); background: rgba(244,242,235,0.85); backdrop-filter: blur(8px); position: sticky; top: 0; z-index: 30; }
  .w-nav-inner { display: flex; align-items: center; gap: 32px; padding: 16px 24px; }
  .w-nav-links { display: flex; gap: 28px; margin-left: 8px; flex: 1; }
  .w-nav-links a { font-size: 15px; font-weight: 500; color: var(--text-secondary); text-decoration: none; }
  .w-nav-links a:hover { color: var(--text-primary); }
  .w-nav-cta { display: flex; gap: 8px; align-items: center; }

  /* hero */
  .w-hero { padding: 72px 0 48px; }
  .w-hero-grid { display: grid; grid-template-columns: 1.05fr 0.95fr; gap: 56px; align-items: center; }
  .w-h1 { font-family: var(--font-display); font-weight: 800; font-size: 58px; line-height: 1.03; letter-spacing: -0.025em; color: var(--ink); margin: 16px 0 0; }
  .w-lead { font-size: 18px; line-height: 1.6; color: var(--text-secondary); max-width: 48ch; margin: 20px 0 0; }
  .w-lead b { color: var(--text-primary); font-weight: 700; }
  .w-cta-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 28px; }
  .w-hero-note { display: inline-flex; align-items: center; gap: 8px; margin-top: 20px; font-size: 14px; color: var(--text-tertiary); }
  .w-hero-visual { display: flex; justify-content: center; }
  .w-phone { width: 316px; background: var(--paper); border: 7px solid var(--ink); border-radius: 40px; padding: 16px 14px; box-shadow: var(--shadow-xl); }
  .w-phone-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding: 0 2px; }

  /* generic section */
  .w-section { padding: 76px 0; }
  .w-section-sunken { background: var(--color-bg-sunken); }
  .w-h2 { font-size: 34px; line-height: 1.16; letter-spacing: -0.015em; font-weight: 700; color: var(--ink); margin: 12px 0 0; }

  /* audience */
  .w-aud-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 44px; }
  .w-aud-ico { display: inline-flex; align-items: center; justify-content: center; width: 52px; height: 52px; border-radius: 14px; background: var(--brand-subtle); color: var(--brand-active); margin-bottom: 16px; }
  .w-aud-h { font-size: 18px; font-weight: 700; margin: 0 0 6px; }
  .w-aud-t { font-size: 14px; line-height: 1.5; color: var(--text-secondary); margin: 0; }

  /* how */
  .w-steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 44px; }
  .w-step { background: var(--color-surface); border: 1px solid var(--border-default); border-radius: var(--radius-xl); padding: 28px 24px; position: relative; }
  .w-step-ico { display: inline-flex; align-items: center; justify-content: center; width: 52px; height: 52px; border-radius: 14px; background: var(--ink); color: #fff; }
  .w-step-n { position: absolute; top: 26px; right: 24px; font-family: var(--font-mono); font-size: 13px; color: var(--text-tertiary); }
  .w-step-h { font-size: 18px; font-weight: 700; margin: 16px 0 6px; }
  .w-step-t { font-size: 14px; line-height: 1.5; color: var(--text-secondary); margin: 0; }

  /* feature */
  .w-feature { display: grid; grid-template-columns: 1fr 1fr; gap: 56px; align-items: center; }
  .w-list { list-style: none; padding: 0; margin: 24px 0 0; display: flex; flex-direction: column; gap: 12px; }
  .w-list li { display: flex; align-items: center; gap: 10px; font-size: 15px; color: var(--text-secondary); }
  .w-list li span, .w-list li svg { color: var(--brand); }
  .w-breakdown { width: 100%; max-width: 440px; justify-self: end; }
  .w-brk-row { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--border-subtle); font-size: 14px; color: var(--text-secondary); }
  .w-brk-total { display: flex; justify-content: space-between; align-items: baseline; padding: 12px 0 14px; font-size: 15px; font-weight: 700; }

  /* stats */
  .w-stats-band { border-top: 1px solid var(--border-default); border-bottom: 1px solid var(--border-default); background: var(--color-surface); }
  .w-stats { display: grid; grid-template-columns: repeat(3, 1fr); }
  .w-stat { text-align: center; padding: 44px 16px; }
  .w-stat + .w-stat { border-left: 1px solid var(--border-subtle); }
  .w-stat-v { font-family: var(--font-display); font-weight: 800; font-size: 42px; letter-spacing: -0.02em; color: var(--ink); }
  .w-stat-l { font-size: 14px; color: var(--text-tertiary); margin-top: 6px; }

  /* CTA band */
  .w-ctaband { background: var(--brand); padding: 72px 0; }
  .w-cta-inner { text-align: center; }
  .w-cta-h { font-family: var(--font-display); font-weight: 800; font-size: 42px; letter-spacing: -0.02em; color: #fff; margin: 0; }
  .w-cta-sub { font-size: 17px; color: rgba(255,255,255,0.9); margin: 12px 0 0; }
  .w-ctaband .w-cta-row { justify-content: center; margin-top: 28px; }

  /* footer */
  .w-footer { background: var(--ink); color: #fff; padding: 56px 0 28px; }
  .w-foot-grid { display: grid; grid-template-columns: 1.6fr 1fr 1fr 1fr; gap: 32px; }
  .w-foot-tag { font-size: 14px; line-height: 1.5; color: rgba(255,255,255,0.55); margin: 14px 0 0; }
  .w-foot-col h4 { font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: rgba(255,255,255,0.5); margin: 0 0 14px; }
  .w-foot-col a { display: block; font-size: 15px; color: rgba(255,255,255,0.82); text-decoration: none; margin-bottom: 10px; }
  .w-foot-col a:hover { color: #fff; }
  .w-foot-legal { display: flex; justify-content: space-between; margin-top: 40px; padding-top: 22px; border-top: 1px solid rgba(255,255,255,0.12); font-size: 13px; color: rgba(255,255,255,0.5); }

  @media (max-width: 900px) {
    .w-hero-grid, .w-feature { grid-template-columns: 1fr; gap: 36px; }
    .w-aud-grid { grid-template-columns: repeat(2, 1fr); }
    .w-steps { grid-template-columns: 1fr; }
    .w-foot-grid { grid-template-columns: 1fr 1fr; }
    .w-nav-links { display: none; }
    .w-h1 { font-size: 44px; }
    .w-breakdown { justify-self: center; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>

  <script type="text/babel" data-presets="react" src="./web.jsx"></script>

</body>
</html>
