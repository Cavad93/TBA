name: Backend tests

on:
  push:
    paths:
      - "home_visit_profit_bot/app/**"
      - "home_visit_profit_bot/tests/**"
      - "home_visit_profit_bot/migrations/**"
      - "home_visit_profit_bot/requirements.txt"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "home_visit_profit_bot/app/**"
      - "home_visit_profit_bot/tests/**"
      - "home_visit_profit_bot/migrations/**"
      - "home_visit_profit_bot/requirements.txt"
      - ".github/workflows/backend-tests.yml"

permissions:
  contents: read

jobs:
  tests:
    name: pytest (SQLite + PostgreSQL RLS)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: home_visit_profit_bot

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Ensure psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Create NON-superuser role + DB (RLS должен реально применяться)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -v ON_ERROR_STOP=1 <<'SQL'
          CREATE ROLE vizitor_test LOGIN PASSWORD 'vizitor_test' NOSUPERUSER NOBYPASSRLS NOCREATEROLE CREATEDB;
          CREATE DATABASE vizitor_isotest OWNER vizitor_test;
          SQL
          psql -h localhost -U postgres -v ON_ERROR_STOP=1 -d vizitor_isotest <<'SQL'
          ALTER SCHEMA public OWNER TO vizitor_test;
          GRANT ALL ON SCHEMA public TO vizitor_test;
          SQL

      - name: Run tests (изоляция ПДн проверяется на живом PostgreSQL)
        env:
          TEST_PG_URL: postgresql://vizitor_test:vizitor_test@localhost:5432/vizitor_isotest
        run: python -m pytest -q
