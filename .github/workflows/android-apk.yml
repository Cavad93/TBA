name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - "home_visit_profit_bot/android_location_client/**"
      - ".github/workflows/android-apk.yml"
  pull_request:
    paths:
      - "home_visit_profit_bot/android_location_client/**"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: read

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Decode release keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS_B64" ]; then
            printf '%s' "$KS_B64" | base64 -d > "$RUNNER_TEMP/release.jks"
            echo "keystore decoded"
          else
            echo "no keystore secret; release will fall back to debug signing"
          fi

      - name: Build release APK
        working-directory: home_visit_profit_bot/android_location_client
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle :app:assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vizitorkrut-release-apk
          path: home_visit_profit_bot/android_location_client/app/build/outputs/apk/release/app-release.apk
