name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - "home_visit_profit_bot/android_location_client/**"
      - ".github/workflows/android-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build debug APK
        working-directory: home_visit_profit_bot/android_location_client
        run: gradle :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: home-visit-gps-debug-apk
          path: home_visit_profit_bot/android_location_client/app/build/outputs/apk/debug/app-debug.apk
